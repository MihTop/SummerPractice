<div class="main-box">

    <div class="post-header d-flex align-items-center gap-3 p-3">
        <div class="post-avatar">
            <img [src]="avatar" alt="Аватар пользователя" />
        </div>
        <div class="post-author-info d-flex flex-column">
            <span class="post-username fw-bold">{{ username }}</span>
            <span class="post-date text-secondary">{{ date }}</span>
        </div>
    </div>

    <div class="post-content px-3">
        <p class="post-text">{{ text }}</p>
    </div>

    <div class="post-image">
        <img [src]="image" alt="Изображение поста" class="w-100" />
    </div>

    <div class="post-footer d-flex align-items-center gap-2 px-3 py-2">
        <span class="like-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
        </span>
        <span class="likes-count fw-semibold">{{ likes }}</span>
    </div>
</div>
